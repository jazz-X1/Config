# Minimal Hyprlock Configuration
# Set the default font for all text widgets
$font = AdwitaMono

# GENERAL section is required but can be empty for defaults
general {
    hide_cursor = true
}

# The BACKGROUND section applies to the entire screen
background {
    monitor = 
    # Use a solid color background (black with full opacity)
    color = rgb(000000)
    # Alternatively, you can blur the current screen:
    # blur_passes = 3
    # blur_size = 7
}

# The INPUT FIELD for typing the password
input-field {
    monitor = 
    size = 200, 50
    position = 0, 50 # Centered horizontally, 50px up from the center
    halign = center
    valign = center
    font_size = 20
    font_family = $font
    fail_text = $PAMFAIL # Text to show on password failure
    dots_size = 0.4
    dots_spacing = 0.3
    outer_color = rgb(151515) # Border color when not focused
    inner_color = rgb(202020) # Background color
    
}

# A LABEL to display the current TIME
label {
    monitor = 
    text = cmd[update:1000] date +'%H:%M:%S' # Update every 1000ms (1 second)
    font_size = 50
    font_family = $font
    position = 0, -50 # 50px above the center (where the input field is)
    halign = center
    valign = center
    color = rgba(ffffffaa) # White with slight transparency
}

# A LABEL to display the current DATE
label {
    monitor = 
    text = cmd[update:60000] date +'%A, %d %B %Y' # Update every 60000ms (1 minute)
    font_size = 20
    font_family = $font
    position = 0, 0 # Centered
    halign = center
    valign = center
    color = rgba(ffffffff) # Solid white
}